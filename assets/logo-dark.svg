<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 150" width="580" height="150" role="img" aria-label="Alfie Meek, Ph.D. — Economist">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600&amp;family=IBM+Plex+Sans:wght@400&amp;family=IBM+Plex+Mono:wght@500&amp;display=swap');
      .name  { font-family:'Newsreader', Georgia, serif; font-weight:500; font-size:44px; letter-spacing:.3px; fill:#ECE6D8; }
      .phd   { font-family:'Newsreader', Georgia, serif; font-weight:600; fill:#E4C689; }
      .eyebrow { font-family:'IBM Plex Mono', ui-monospace, monospace; font-weight:500; font-size:13px; letter-spacing:3px; fill:#C69749; }
      .tag   { font-family:'IBM Plex Sans', system-ui, sans-serif; font-weight:400; font-size:15px; letter-spacing:.4px; fill:#8494A6; }
    </style>
  </defs>
  <rect width="580" height="150" fill="#131C28"/>
  <g transform="translate(24,27) scale(0.80)">
    <circle cx="60" cy="62" r="53" fill="#1C2836" stroke="#C69749" stroke-width="2.5"/>
    <circle cx="60" cy="62" r="47.5" fill="none" stroke="#2C3D52" stroke-width="1"/>
    <path d="M28 62 A32 32 0 0 1 92 62" fill="none" stroke="#C3CAD4" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
    <g stroke="#8494A6" stroke-width="2" stroke-linecap="round">
      <line x1="30" y1="62" x2="36" y2="62"/>
      <line x1="37.4" y1="39.4" x2="42.3" y2="44.3"/>
      <line x1="60" y1="30" x2="60" y2="37"/>
      <line x1="82.6" y1="39.4" x2="77.7" y2="44.3"/>
      <line x1="84" y1="62" x2="90" y2="62"/>
    </g>
    <line x1="60" y1="62" x2="76.5" y2="37.5" stroke="#E4C689" stroke-width="3.2" stroke-linecap="round"/>
    <circle cx="60" cy="62" r="5.5" fill="#C69749"/>
    <circle cx="60" cy="62" r="2" fill="#131C28"/>
  </g>
  <text x="150" y="58" class="eyebrow">ECONOMIST</text>
  <text x="149" y="94" class="name">Alfie Meek, <tspan class="phd">Ph.D.</tspan></text>
  <text x="150" y="119" class="tag">Fiscal &amp; Economic Impact Analysis</text>
</svg>
